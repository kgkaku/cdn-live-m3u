name: Update IPTV Playlist

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:  
  push:
    branches:
      - main
    paths:
      - 'main.py'

jobs:
  update-playlist:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests
        
    - name: Decode and run
      env:
        MAIN_PY: ${{ secrets.MAIN_PY }}
      run: |
        # Decode the base64 secret and save to file
        echo "$MAIN_PY" | base64 -d > main_decoded.py
        
        # Make the script executable
        chmod +x main_decoded.py
        
        # Run the script
        python main_decoded.py
        
    - name: Check if playlist was created
      id: check_playlist
      run: |
        if [ -f "edge-cdn-live.m3u" ]; then
          echo "playlist_exists=true" >> $GITHUB_OUTPUT
          echo "Playlist file exists"
        else
          echo "playlist_exists=false" >> $GITHUB_OUTPUT
          echo "Playlist file does not exist"
        fi
        
    - name: Commit and push changes
      if: steps.check_playlist.outputs.playlist_exists == 'true'
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add edge-cdn-live.m3u
        git diff --quiet && git diff --staged --quiet || git commit -m "Update IPTV playlist - $(date '+%Y-%m-%d %H:%M:%S')"
        git push
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        
    - name: Upload playlist as artifact
      uses: actions/upload-artifact@v3
      if: steps.check_playlist.outputs.playlist_exists == 'true'
      with:
        name: iptv-playlist
        path: edge-cdn-live.m3u
        retention-days: 7
